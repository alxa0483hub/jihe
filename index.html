<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>线索几何：辅助线挑战</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app">
      <section class="stage">
        <header class="topbar">
          <div>
            <p class="eyebrow">初二几何拔高训练</p>
            <h1>线索几何</h1>
          </div>
          <div class="scoreboard">
            <span id="levelTag">第 1 关</span>
            <strong id="scoreText">100</strong>
          </div>
        </header>

        <section class="board">
          <div class="diagram-wrap">
            <div class="diagram-head">
              <span id="difficultyText">难度：挑战</span>
              <span id="targetText"></span>
            </div>
            <svg id="diagram" viewBox="0 0 720 520" role="img" aria-label="几何题图"></svg>
          </div>

          <aside class="panel">
            <div class="problem-card">
              <div class="chapter-row">
                <span id="chapterText"></span>
                <button id="resetBtn" class="icon-btn" title="重做本关">↻</button>
              </div>
              <h2 id="problemTitle"></h2>
              <p id="problemText"></p>
            </div>

            <div class="task-block">
              <div class="task-title">
                <span>一、判断破局策略</span>
                <small id="strategyState">未完成</small>
              </div>
              <div id="strategyChoices" class="choice-grid"></div>
            </div>

            <div class="task-block">
              <div class="task-title">
                <span>二、选择辅助线</span>
                <small id="lineState">未完成</small>
              </div>
              <div id="lineChoices" class="choice-grid"></div>
            </div>

            <div class="task-block proof-block">
              <div class="task-title">
                <span>三、排出关键证明链</span>
                <small id="proofState">未完成</small>
              </div>
              <div id="proofBank" class="proof-bank"></div>
              <div id="proofSlots" class="proof-slots"></div>
            </div>

            <div class="actions">
              <button id="checkBtn" class="primary">提交本关</button>
              <button id="hintBtn" class="secondary">提示</button>
              <button id="nextBtn" class="secondary" disabled>下一关</button>
            </div>
          </aside>
        </section>
      </section>

      <section class="feedback">
        <div>
          <p class="eyebrow">思路反馈</p>
          <h2 id="feedbackTitle">先观察结论，再决定构造</h2>
        </div>
        <p id="feedbackText">选择一个策略开始。高阶几何题通常不是缺知识，而是缺少能把条件和目标接起来的构造。</p>
        <div id="insightTags" class="tags"></div>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
